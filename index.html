<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vesto - Virtual Try On (3D)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main-container">
        
        <header class="top-section">
            <h1 class="logo">Vesto <span>Virtual Try On</span></h1>
            <div class="avatar-controls">
                
                <div class="gender-toggle">
                    <button class="gender-btn active" data-gender="male" id="btn-male">Male 👨</button>
                    <button class="gender-btn" data-gender="female" id="btn-female">Female 👩</button>
                </div>

                <div class="input-group">
                    <label for="height">Height (cm)</label>
                    <input type="number" id="height" placeholder="175">
                </div>
                <div class="input-group">
                    <label for="weight">Weight (kg)</label>
                    <input type="number" id="weight" placeholder="70">
                </div>
                <button id="create-avatar-btn" class="primary-btn">Create Avatar</button>
            </div>
        </header>

        <main class="content-split">
            
            <section class="avatar-display-area">
                <div class="avatar-placeholder" id="avatar-container">
                    </div>
                <div class="current-outfit-label">
                    Current outfit: <span id="outfit-name" class="highlight-text">None</span>
                </div>
            </section>

            <section class="clothing-panel">
                <h2>Select Clothing</h2>
                <div class="clothing-grid">
                    
                    <div class="clothing-item" data-id="tshirt" data-name="T-Shirt">
                        <div class="item-icon-wrapper">
                            <img src="images/tshirt-icon.svg" alt="T-Shirt" class="item-icon">
                        </div>
                        <h3 class="item-name">T-Shirt</h3>
                        <button class="wear-btn">Wear</button>
                    </div>

                    <div class="clothing-item" data-id="jacket" data-name="Jacket">
                        <div class="item-icon-wrapper">
                            <img src="images/jacket-icon.svg" alt="Jacket" class="item-icon">
                        </div>
                        <h3 class="item-name">Jacket</h3>
                        <button class="wear-btn">Wear</button>
                    </div>

                    <div class="clothing-item" data-id="hoodie" data-name="Hoodie">
                        <div class="item-icon-wrapper">
                            <img src="images/hoodie-icon.svg" alt="Hoodie" class="item-icon">
                        </div>
                        <h3 class="item-name">Hoodie</h3>
                        <button class="wear-btn">Wear</button>
                    </div>

                    <div class="clothing-item" data-id="shirt" data-name="Shirt">
                        <div class="item-icon-wrapper">
                            <img src="images/shirt-icon.svg" alt="Shirt" class="item-icon">
                        </div>
                        <h3 class="item-name">Shirt</h3>
                        <button class="wear-btn">Wear</button>
                    </div>

                </div>
            </section>
        </main>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
