<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vesto - Virtual Try On</title>
    <!-- استدعاء خطوط جوجل للحصول على تصميم عصري وأنيق -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- الحاوية الرئيسية التي تتوسط الشاشة -->
    <div class="main-container">
        
        <!-- القسم العلوي: العنوان وإعدادات الأفاتار -->
        <header class="top-section">
            <h1 class="logo">Vesto <span>Virtual Try On</span></h1>
            <div class="avatar-controls">
                <div class="input-group">
                    <label for="height">Height (cm)</label>
                    <input type="number" id="height" placeholder="175">
                </div>
                <div class="input-group">
                    <label for="weight">Weight (kg)</label>
                    <input type="number" id="weight" placeholder="70">
                </div>
                <!-- زر إنشاء الأفاتار -->
                <button id="create-avatar-btn" class="primary-btn">Create Avatar</button>
            </div>
        </header>

        <!-- منطقة المحتوى الرئيسية المقسمة لجزئين -->
        <main class="content-split">
            
            <!-- الجانب الأيسر: منطقة عرض الأفاتار (مساحة 2D للمحاكاة) -->
            <section class="avatar-display-area">
                <div class="avatar-placeholder" id="avatar-container">
                    <!-- طبقة الأفاتار الأساسي (الجسم) محملة من مجلد images -->
                    <img id="base-avatar" class="avatar-layer" src="images/base-avatar.svg" alt="Base Avatar">
                    <!-- طبقة الملابس (شفافة في البداية لتظهر عند الاختيار) تكون فوق الجسم -->
                    <img id="clothing-overlay" class="avatar-layer fade-out" src="" alt="Clothing Overlay">
                </div>
                <!-- نص يوضح الزي الحالي الذي تم اختياره -->
                <div class="current-outfit-label">
                    Current outfit: <span id="outfit-name" class="highlight-text">None</span>
                </div>
            </section>

            <!-- الجانب الأيمن: لوحة اختيار الملابس -->
            <section class="clothing-panel">
                <h2>Select Clothing</h2>
                <div class="clothing-grid">
                    
                    <!-- عنصر ملابس: تي شيرت -->
                    <div class="clothing-item" data-id="tshirt" data-name="T-Shirt">
                        <div class="item-icon-wrapper">
                            <img src="images/tshirt-icon.svg" alt="T-Shirt" class="item-icon">
                        </div>
                        <h3 class="item-name">T-Shirt</h3>
                        <button class="wear-btn">Wear</button>
                    </div>

                    <!-- عنصر ملابس: جاكيت -->
                    <div class="clothing-item" data-id="jacket" data-name="Jacket">
                        <div class="item-icon-wrapper">
                            <img src="images/jacket-icon.svg" alt="Jacket" class="item-icon">
                        </div>
                        <h3 class="item-name">Jacket</h3>
                        <button class="wear-btn">Wear</button>
                    </div>

                    <!-- عنصر ملابس: هودي -->
                    <div class="clothing-item" data-id="hoodie" data-name="Hoodie">
                        <div class="item-icon-wrapper">
                            <img src="images/hoodie-icon.svg" alt="Hoodie" class="item-icon">
                        </div>
                        <h3 class="item-name">Hoodie</h3>
                        <button class="wear-btn">Wear</button>
                    </div>

                    <!-- عنصر ملابس: قميص -->
                    <div class="clothing-item" data-id="shirt" data-name="Shirt">
                        <div class="item-icon-wrapper">
                            <img src="images/shirt-icon.svg" alt="Shirt" class="item-icon">
                        </div>
                        <h3 class="item-name">Shirt</h3>
                        <button class="wear-btn">Wear</button>
                    </div>

                </div>
            </section>
        </main>
    </div>

    <!-- ربط ملف الجافاسكريبت المحدث -->
    <script src="script.js"></script>
</body>
</html>
